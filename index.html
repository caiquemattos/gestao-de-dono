<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoBraz — Comunidade de Empresários</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --brand:#0b3a6f;--brand-2:#1160b8;--brand-ink:#062647;--accent:#f5a623;
    --bg:#f4f6fa;--card:#fff;--ink:#152436;--muted:#5b6b7d;--line:#e2e8f1;
    --ok:#1f9d55;--warn:#d9822b;--danger:#c0392b;--purple:#6b4fbb;
    --radius:16px;--shadow:0 10px 30px rgba(11,58,111,.09);--shadow-sm:0 4px 14px rgba(11,58,111,.06);--maxw:980px;
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;font-size:16px;-webkit-font-smoothing:antialiased}
  a{color:var(--brand-2);text-decoration:none}a:hover{text-decoration:underline}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}.narrow{max-width:760px}
  header.top{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line)}
  .top .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:var(--maxw)}
  .logo{display:flex;align-items:center;gap:11px;cursor:pointer}
  .logo img.brandlogo{height:34px;width:auto;display:block}
  .logo .name{font-weight:800;letter-spacing:-.3px;color:var(--brand-ink);line-height:1.05}
  .logo .name small{display:block;font-weight:500;font-size:10.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .logo .sep{width:1px;height:26px;background:var(--line)}
  @media(max-width:520px){.logo .name{display:none}.logo .sep{display:none}}
  .top .consultor-link{font-size:13px;color:var(--muted);border:1px solid var(--line);padding:7px 13px;border-radius:999px}
  .top .consultor-link:hover{color:var(--brand-2);border-color:var(--brand-2);text-decoration:none}
  .top .userchip{display:flex;gap:8px;align-items:center}
  .chip{font-size:12.5px;color:var(--muted);border:1px solid var(--line);padding:6px 11px;border-radius:999px;background:#fff}
  main{padding:40px 0 80px;min-height:60vh}
  .hero{text-align:center;padding:30px 0 8px}
  .hero h1{font-size:clamp(28px,4vw,42px);line-height:1.1;letter-spacing:-1px;margin:0 0 16px;color:var(--brand-ink)}
  .hero p.lead{font-size:19px;color:var(--muted);max-width:680px;margin:0 auto 12px}
  .eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--brand-2);background:#eaf1fb;padding:6px 14px;border-radius:999px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:26px}
  .card.soft{box-shadow:var(--shadow)}.card+.card{margin-top:18px}
  .card h2{margin:0 0 6px;font-size:22px;letter-spacing:-.4px;color:var(--brand-ink)}
  .card h3{margin:0 0 6px;font-size:17px;color:var(--brand-ink)}
  .card .sub{color:var(--muted);margin:0 0 18px}
  .stack{display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>*{flex:1;min-width:220px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:720px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
  .muted{color:var(--muted)}.small{font-size:13px}.xs{font-size:11.5px}.center{text-align:center}.bold{font-weight:700}
  .mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt22{margin-top:22px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
  .divider{height:1px;background:var(--line);margin:22px 0}
  .flex{display:flex}.between{justify-content:space-between}.centered{align-items:center}.gap8{gap:8px}.gap12{gap:12px}.wrapgap{flex-wrap:wrap}
  .pill{display:inline-block;font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px;background:#eaf1fb;color:var(--brand-2)}
  .pill.warn{background:#fdf1e3;color:var(--warn)}.pill.ok{background:#e7f6ee;color:var(--ok)}.pill.grey{background:#eef1f5;color:var(--muted)}.pill.purple{background:#efeafb;color:var(--purple)}.pill.red{background:#fbe9e7;color:var(--danger)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;text-decoration:none}
  .btn.block{width:100%}
  .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;box-shadow:var(--shadow-sm)}
  .btn-primary:hover{filter:brightness(1.06);text-decoration:none}
  .btn-outline{background:#fff;border-color:var(--line);color:var(--brand-ink)}.btn-outline:hover{border-color:var(--brand-2);color:var(--brand-2);text-decoration:none}
  .btn-ghost{background:transparent;color:var(--muted)}.btn-ghost:hover{color:var(--brand-2)}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:9px}
  .btn-danger{background:#fff;border-color:#f0c8c2;color:var(--danger)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .cta{border:1px solid var(--line);border-radius:14px;padding:20px;background:#fff;display:flex;flex-direction:column;gap:12px}
  .cta.primary{border-color:var(--brand-2);background:linear-gradient(180deg,#f3f8ff,#fff);box-shadow:var(--shadow)}
  .cta .cta-head{display:flex;align-items:flex-start;gap:11px}
  .cta .num{width:26px;height:26px;border-radius:8px;background:var(--brand-2);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800;flex:none;margin-top:1px}
  .cta.secondary .num{background:#9fb2c8}
  .cta h4{margin:0;font-size:16px;color:var(--brand-ink)}.cta p{margin:2px 0 0;color:var(--muted);font-size:14px}
  label.field{display:block;margin-bottom:14px}
  label.field .lab{display:block;font-weight:600;font-size:14px;margin-bottom:6px;color:var(--ink)}
  .req{color:var(--danger)}
  input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(17,96,184,.12)}
  textarea{min-height:90px;resize:vertical}
  .check{display:flex;gap:10px;align-items:flex-start;font-size:14px;color:var(--muted)}.check input{width:auto;margin-top:3px}
  .hint{font-size:12.5px;color:var(--muted);margin-top:4px}
  .q{border:1px solid var(--line);border-radius:12px;padding:18px;background:#fff}.q+.q{margin-top:14px}
  .q .qhead{display:flex;gap:10px;align-items:flex-start;margin-bottom:6px}
  .q .qn{width:26px;height:26px;border-radius:7px;background:#eaf1fb;color:var(--brand-2);display:grid;place-items:center;font-weight:800;font-size:13px;flex:none}
  .q .qtext{font-weight:600;font-size:15px}
  .q .qmeta{font-size:11.5px;color:var(--muted);margin:2px 0 12px 36px;text-transform:uppercase;letter-spacing:.4px}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;font-size:14px;transition:.12s}
  .opt:hover{border-color:var(--brand-2);background:#f7faff}
  .opt.sel{border-color:var(--brand-2);background:#eef5ff;box-shadow:inset 0 0 0 1px var(--brand-2)}
  .opt input{width:auto;margin-top:2px}.opt .ov{font-weight:800;color:var(--brand-2);margin-right:4px}
  .progress{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin:8px 0 20px}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-2));transition:width .3s}
  .gauge{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .gauge .big{font-size:54px;font-weight:800;line-height:1}
  .gauge .stage{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
  .bar{height:9px;background:var(--line);border-radius:999px;overflow:hidden}.bar>div{height:100%;border-radius:999px}
  .pillar-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .pillar-row .pl{flex:0 0 220px;font-size:14px;font-weight:600}
  .pillar-row .bar{flex:1}.pillar-row .val{flex:0 0 40px;text-align:right;font-weight:700;font-size:14px}
  @media(max-width:640px){.pillar-row .pl{flex-basis:140px}}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto}
  .tabs button{background:none;border:none;padding:11px 14px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}
  .tabs button.active{color:var(--brand-2);border-bottom-color:var(--brand-2)}
  .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:#f9fbfe}
  tr:hover td{background:#f9fbfe}
  .code-badge{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#eef4fc;color:var(--brand-ink);padding:3px 8px;border-radius:6px;font-weight:700;font-size:13px;letter-spacing:.06em}
  .stat{font-size:30px;font-weight:800;color:var(--brand-2);line-height:1}
  .modal-bg{position:fixed;inset:0;background:rgba(6,38,71,.55);z-index:100;display:grid;place-items:center;padding:20px}
  .modal{background:#fff;border-radius:16px;max-width:660px;width:100%;max-height:90vh;overflow:auto;box-shadow:var(--shadow);padding:26px}
  .modal h2{margin-top:0}
  .notice{background:#eaf1fb;border:1px solid #cfe0f6;border-radius:12px;padding:14px 16px;font-size:14px;color:var(--brand-ink)}
  .notice.warn{background:#fdf6ec;border-color:#f3ddba;color:#7a5320}
  .notice.ok{background:#e7f6ee;border-color:#bde5cd;color:#1c5f3a}
  .linkbox{display:flex;gap:8px;align-items:center;background:#f5f8fc;border:1px dashed var(--line);border-radius:10px;padding:8px 10px}
  .linkbox code{font-family:ui-monospace,monospace;font-size:12px;word-break:break-all;flex:1;color:var(--brand-ink)}
  footer{border-top:1px solid var(--line);padding:26px 0;color:var(--muted);font-size:13px;text-align:center}
  .hidden{display:none!important}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--brand-ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .steps{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .steps .st{flex:1;min-width:120px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--muted);background:#fff}
  .steps .st b{display:block;color:var(--brand-ink);font-size:13px}
  .steps .st.on{border-color:var(--brand-2);background:#f3f8ff}
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <div class="logo" onclick="setRoute({})">
      <img class="brandlogo" src="assets/logo-gobraz-light.png" alt="GoBraz — Comunidade de Empresários"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block';this.parentElement.querySelector('.name').style.display='block';">
      <div class="mark-fallback" style="display:none;width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;font-weight:800;font-size:17px;line-height:36px;text-align:center">Gb</div>
      <div class="sep"></div>
      <div class="name">Comunidade<small>de Empresários</small></div>
    </div>
    <div id="top-right"></div>
  </div>
</header>
<main><div class="wrap" id="app"></div></main>
<footer><div class="wrap">GoBraz — Comunidade de Empresários · Uma leitura estruturada de gestão para famílias empresárias</div></footer>
<div id="modal-root"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================================
   GoBraz Assessment v5 — single-file, sem backend. Storage: localStorage.
   STORE_KEY = gobraz_assessment_v5
   Compatível com GitHub Pages e com o esquema de links por query-param.

   [PERMISSÃO] REGRAS CRÍTICAS DE ACESSO — ver comentários marcados abaixo:
   - Participante comum: só a própria resposta e o próprio resultado.
   - Sócio: própria resposta + média dos demais (só com 3+ concluídos) +
            análise final SOMENTE se liberada. NUNCA respostas individuais de
            outros; NUNCA agrupamento por persona.
   - Consultor/Admin: acesso total.
   - A experiência pública NÃO menciona localStorage / protótipo / detalhes técnicos.
   ============================================================================ */
const STORE_KEY='gobraz_assessment_v5';

/* ---------------------------- Escalas (A/B/C/D) --------------------------- */
const SCALES={
 A:{name:'Existência / prática',opts:[
   {v:1,t:'Não existe'},
   {v:2,t:'Existe de forma informal'},
   {v:3,t:'Existe parcialmente, mas não é seguido com consistência'},
   {v:4,t:'Existe e é seguido com frequência'},
   {v:5,t:'Existe, é seguido e gera melhoria na gestão'}]},
 B:{name:'Clareza / percepção',opts:[
   {v:1,t:'Não tenho clareza'},
   {v:2,t:'Tenho pouca clareza'},
   {v:3,t:'Tenho clareza parcial'},
   {v:4,t:'Tenho boa clareza'},
   {v:5,t:'Tenho clareza plena e isso orienta minha atuação'}]},
 C:{name:'Autonomia / decisão',opts:[
   {v:1,t:'Quase tudo depende dos sócios'},
   {v:2,t:'Algumas decisões simples são delegadas'},
   {v:3,t:'Há autonomia parcial, mas com muitas zonas cinzentas'},
   {v:4,t:'A autonomia é clara na maior parte das decisões'},
   {v:5,t:'As alçadas são claras, respeitadas e dão velocidade à gestão'}]},
 D:{name:'Alinhamento / conflito',opts:[
   {v:1,t:'Há desalinhamentos frequentes e relevantes'},
   {v:2,t:'Há desalinhamentos que impactam a rotina'},
   {v:3,t:'Há alinhamento parcial, com pontos de tensão'},
   {v:4,t:'Há bom alinhamento na maior parte dos temas'},
   {v:5,t:'Há alinhamento claro, conversas maduras e critérios respeitados'}]}
};

/* ------------------------------- Personas -------------------------------- */
// Personas públicas (cadastro inicial). 'socio' define papel de Sócio.
const PERSONAS={socio:'Sócio',sucessor:'Sucessor',lider_familiar:'Líder familiar',lider_nao_familiar:'Líder não familiar'};
const PKEYS=['socio','sucessor','lider_familiar','lider_nao_familiar'];
const ROLES={admin:'Consultor',consultor:'Consultor',socio:'Sócio',respondente:'Participante'};

/* ----------------- Dados complementares (benchmark) ---------------------- */
const SEGMENTS=['Varejo','Franquias','Indústria','Serviços','Saúde','Educação','Construção/Infraestrutura','Tecnologia','Agronegócio','Distribuição/Atacado','Outro'];
const REVENUES=['Até R$ 5MM','R$ 5MM a R$ 20MM','R$ 20MM a R$ 70MM','R$ 70MM a R$ 200MM','R$ 200MM a R$ 500MM','Acima de R$ 500MM','Prefiro não informar'];
const HEADCOUNT=['Até 20','21 a 50','51 a 150','151 a 500','501 a 1.500','Acima de 1.500'];
const MOMENTS=['Crescimento','Profissionalização','Sucessão','Reorganização societária','Conflito ou desalinhamento','Transição de liderança','Outro'];

/* ------------------------------ Termômetro ------------------------------- */
// Leitura inicial: percepção rápida de maturidade, informalidade e dependência.
const THERMO=[
 {id:'t1',scale:'B',p:'Há clareza sobre as prioridades da empresa para os próximos 12 meses.'},
 {id:'t2',scale:'B',p:'As pessoas sabem quem decide o quê nos temas importantes.'},
 {id:'t3',scale:'C',p:'A operação avança sem depender dos sócios a cada decisão do dia a dia.'},
 {id:'t4',scale:'A',p:'As reuniões de gestão geram decisões claras, responsáveis e acompanhamento.'},
 {id:'t5',scale:'A',p:'Os principais indicadores são acompanhados e usados para decidir.'},
 {id:'t6',scale:'D',p:'Sócios, sucessores e lideranças enxergam a gestão de forma alinhada.'},
 {id:'t7',scale:'A',p:'A empresa se prepara ativamente para continuidade e sucessão.'}
];

/* -------------------------- Avaliação do cluster ------------------------- */
// Classifica a empresa num estágio geral (C1..C5) para orientar a próxima camada.
const CLUSTER_Q=[
 {id:'c1',scale:'C',p:'O quanto a empresa consegue funcionar sem a presença direta do dono/sócios no dia a dia.'},
 {id:'c2',scale:'A',p:'Existência de processos e rotinas de gestão formalizados e realmente seguidos.'},
 {id:'c3',scale:'A',p:'Uso de indicadores para acompanhar desempenho e orientar decisões.'},
 {id:'c4',scale:'A',p:'Clareza de papéis e alçadas entre sócios, familiares e lideranças.'},
 {id:'c5',scale:'A',p:'Existência de fóruns de gestão ou governança (reuniões estruturadas, conselho, comitês).'},
 {id:'c6',scale:'A',p:'Preparação estruturada para sucessão e continuidade de longo prazo.'}
];
const CLUSTERS={
 C1:{name:'Gestão centrada no dono',desc:'A empresa depende fortemente do dono/sócios. Decisões, memória e execução se concentram em poucas pessoas.',rec:'Recomendamos fortemente a avaliação da prática com foco em papéis, decisão, ritos e indicadores.'},
 C2:{name:'Gestão informal em transição',desc:'Já há tentativas de organização, mas os processos ainda dependem das pessoas e não são consistentes.',rec:'Recomendamos a avaliação da prática com foco em papéis, decisão, ritos e indicadores.'},
 C3:{name:'Gestão em estruturação',desc:'Processos e rotinas começam a se firmar. O desafio é consistência, alçadas e performance.',rec:'Recomendamos a avaliação da prática e atenção a sucessão, alçadas e performance.'},
 C4:{name:'Gestão profissionalizada',desc:'A gestão funciona com processos, indicadores e autonomia. O foco passa a ser governança e continuidade.',rec:'Recomendamos aprofundamento em governança, sucessão, fóruns, legado e continuidade.'},
 C5:{name:'Governança em evolução',desc:'A empresa opera com maturidade de gestão e busca aprimorar governança, sucessão e legado.',rec:'Recomendamos aprofundamento em governança, sucessão, fóruns, legado e continuidade.'}
};
function clusterOf(score){ // score 1..5
 if(score<2.0)return'C1';if(score<2.8)return'C2';if(score<3.6)return'C3';if(score<4.3)return'C4';return'C5';}

/* ------------------------- Avaliação da prática -------------------------- */
// 8 pilares, até 3 perguntas cada, adaptadas por persona. Cada pergunta mede a
// mesma tensão pela lente de cada persona e aponta para o tipo de escala adequado.
// t: {socio, sucessor, lider_familiar, lider_nao_familiar}
function ptxt(s,su,lf,ln){return{socio:s,sucessor:su,lider_familiar:lf,lider_nao_familiar:ln};}
const PILLARS=[
 {id:'direcao',name:'Direção e prioridades',desc:'Clareza de rumo, prioridades e critérios de escolha.',qs:[
   {scale:'B',t:ptxt(
     'Tenho clareza das prioridades reais da empresa para os próximos 12 meses.',
     'Entendo com clareza quais são as prioridades da empresa para os próximos 12 meses.',
     'Tenho clareza das prioridades da empresa e consigo traduzi-las para minha área.',
     'Recebo clareza suficiente sobre as prioridades da empresa para orientar minha área.')},
   {scale:'A',t:ptxt(
     'As prioridades são comunicadas de forma que a liderança consiga agir.',
     'As prioridades chegam a mim de forma clara e orientam minhas entregas.',
     'As prioridades são comunicadas com critério e não apenas por urgência.',
     'As mudanças de prioridade são explicadas com contexto e critério.')}]},
 {id:'papeis',name:'Papéis e responsabilidades',desc:'Quem faz, decide, acompanha e presta contas.',qs:[
   {scale:'B',t:ptxt(
     'Os papéis de sócios, familiares e lideranças estão claros na prática.',
     'Meu papel atual é claro para mim e para os demais.',
     'Meu papel como liderança é claro e não se confunde com minha relação familiar.',
     'Meu papel e minhas responsabilidades são claros na prática.')},
   {scale:'A',t:ptxt(
     'Quando surge um problema relevante, fica claro quem deve conduzir a solução.',
     'Sei quais responsabilidades são minhas hoje e a quem recorrer.',
     'As responsabilidades entre familiares e não familiares seguem critérios profissionais.',
     'A divisão de responsabilidades evita retrabalho e zonas cinzentas.')}]},
 {id:'decisao',name:'Decisão e autonomia',desc:'Capacidade de decidir sem centralização excessiva.',qs:[
   {scale:'C',t:ptxt(
     'As lideranças sabem quais decisões podem tomar sem consultar os sócios.',
     'Tenho clareza sobre quais decisões posso tomar hoje e quais dependem dos sócios.',
     'Minha autonomia é clara e não se confunde com minha relação familiar.',
     'Tenho autonomia real para decidir na minha área sem depender excessivamente dos sócios.')},
   {scale:'D',t:ptxt(
     'As decisões importantes não travam por dependência ou desalinhamento entre sócios.',

function defaultState(){return{version:5,users:[],groups:[],responses:[],interviews:[],analysis:[],current:null,seeded:false};}

/* ============================================================================
   CAMADA DE STORAGE (StorageProvider)
   ----------------------------------------------------------------------------
   Toda a lógica de aplicação continua trabalhando com o estado em memória `S`
   e chamando load()/save(S). A PERSISTÊNCIA é delegada a um provider:
     - LocalStorageProvider: só localStorage (funciona offline, sem backend).
     - GoogleSheetsProvider : cache local + sincronização via Apps Script.
   O provider ativo é escolhido por STORAGE_CONFIG. Trocar de provider NÃO exige
   reescrever a lógica da aplicação.
   ============================================================================ */
const CFG_KEY='gobraz_cfg_v5';
const PENDING_KEY='gobraz_pending_v5';
function loadCfg(){try{return JSON.parse(localStorage.getItem(CFG_KEY))||{};}catch{return{};}}
function saveCfg(){localStorage.setItem(CFG_KEY,JSON.stringify({provider:STORAGE_CONFIG.provider,scriptUrl:STORAGE_CONFIG.scriptUrl,adminToken:STORAGE_CONFIG.adminToken}));}
// Precedência: defaults <- localStorage (painel do consultor) <- window.GOBRAZ_CONFIG (deploy).
// adminToken NUNCA vem do objeto público global — só do localStorage do consultor.
const STORAGE_CONFIG=(function(){
 const saved=loadCfg();const glob=(typeof window!=='undefined'&&window.GOBRAZ_CONFIG)||{};
 const cfg={provider:'local',scriptUrl:'',adminToken:'',publicMode:true};
 Object.assign(cfg,{provider:saved.provider||cfg.provider,scriptUrl:saved.scriptUrl||'',adminToken:saved.adminToken||''});
 if(glob.provider)cfg.provider=glob.provider;
 if(glob.scriptUrl)cfg.scriptUrl=glob.scriptUrl;
 if(glob.publicMode!==undefined)cfg.publicMode=glob.publicMode;
 return cfg;
})();

// Estados de sincronização exibidos apenas no painel do consultor.
const SyncState={status:'Local',lastSync:null,remoteCounts:null};
function setSyncStatus(s){SyncState.status=s;const el=document.getElementById('sync-status');if(el)el.textContent=s;}
function loadPending(){try{return JSON.parse(localStorage.getItem(PENDING_KEY))||[];}catch{return[];}}
function savePending(p){localStorage.setItem(PENDING_KEY,JSON.stringify(p));}
function queuePending(kind,obj){const p=loadPending();p.push({kind,obj,at:now()});savePending(p);}

// Chamada HTTP ao Apps Script. POST usa text/plain para evitar preflight CORS.
async function apiCall(method,action,params={},body=null){
 if(!STORAGE_CONFIG.scriptUrl)throw new Error('scriptUrl não configurado');
 const url=new URL(STORAGE_CONFIG.scriptUrl);url.searchParams.set('action',action);
 Object.entries(params).forEach(([k,v])=>{if(v!=null)url.searchParams.set(k,v);});
 const opt={method,redirect:'follow'};
 if(method==='POST'){opt.headers={'Content-Type':'text/plain;charset=utf-8'};opt.body=JSON.stringify(Object.assign({action},body||{}));}
 const res=await fetch(url.toString(),opt);
 return await res.json();
}

const LocalStorageProvider={
 name:'local',
 async init(){setSyncStatus('Local');},
 readCache(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||defaultState();}catch{return defaultState();}},
 persist(state){localStorage.setItem(STORE_KEY,JSON.stringify(state));},
 async pushEntity(){/* nada a fazer: tudo já está no localStorage */},
 async pull(){return null;},
 async publicSummary(){return null;} // no modo local a média usa o cache local
};

const GoogleSheetsProvider={
 name:'sheets',
 async init(){
  setSyncStatus('Sincronizando');
  try{const r=await apiCall('GET','health');setSyncStatus(r&&r.ok?'Sincronizado':'Erro de sincronização');SyncState.lastSync=now();}
  catch(e){setSyncStatus('Offline/cache local');}
 },
 readCache(){return LocalStorageProvider.readCache();},        // cache local para UX
 persist(state){LocalStorageProvider.persist(state);},          // sempre mantém cópia local
 // Envia uma entidade ao Sheets; em falha, guarda em fila de pendências (fallback local).
 async pushEntity(kind,obj){
  const map={user:'upsertUser',group:'upsertGroup',response:'upsertResponse',interview:'upsertInterview',analysis:'upsertAnalysis'};
  const action=map[kind];if(!action)return;
  try{setSyncStatus('Sincronizando');const r=await apiCall('POST',action,{},{[kind]:obj});
   if(!r||!r.ok)throw new Error(r&&r.error||'falha');setSyncStatus('Sincronizado');SyncState.lastSync=now();}
  catch(e){queuePending(kind,obj);setSyncStatus('Offline/cache local');}
 },
 // Reenvia pendências acumuladas.
 async flush(){
  let p=loadPending();if(!p.length)return{sent:0,failed:0};let sent=0,failed=0;const rest=[];
  for(const item of p){const map={user:'upsertUser',group:'upsertGroup',response:'upsertResponse',interview:'upsertInterview',analysis:'upsertAnalysis'};
   try{const r=await apiCall('POST',map[item.kind],{},{[item.kind]:item.obj});if(r&&r.ok)sent++;else{failed++;rest.push(item);}}
   catch{failed++;rest.push(item);}}
  savePending(rest);return{sent,failed};
 },
 // [PERMISSÃO] painel consultor: exige adminToken; traz a base consolidada.
 async pull(){
  const r=await apiCall('GET','adminBootstrap',{adminToken:STORAGE_CONFIG.adminToken});
  if(!r||!r.ok)throw new Error(r&&r.error||'falha no adminBootstrap');
  return r.data;
 },
 // [PERMISSÃO] resumo público anonimizado: nunca retorna PII nem respostas individuais.
 async publicSummary(groupId,selfResponseId){
  try{const r=await apiCall('GET','publicGroupSummary',{groupId,selfResponseId});return r&&r.ok?r.data:null;}catch{return null;}
 }
};

// Fachada usada pela aplicação. Mantém load()/save() síncronos sobre o cache local.
const Sync={
 provider:LocalStorageProvider,
 async init(){this.provider=STORAGE_CONFIG.provider==='sheets'?GoogleSheetsProvider:LocalStorageProvider;await this.provider.init();
  if(this.provider===GoogleSheetsProvider){try{await GoogleSheetsProvider.flush();}catch{}}},
 persist(state){this.provider.persist(state);},
 push(kind,obj){try{this.provider.pushEntity&&this.provider.pushEntity(kind,obj);}catch{}},
 async pull(){return this.provider.pull?this.provider.pull():null;},
 async publicSummary(g,s){return this.provider.publicSummary?this.provider.publicSummary(g,s):null;},
 isSheets(){return this.provider===GoogleSheetsProvider;}
};

function load(){return (Sync.provider||LocalStorageProvider).readCache();}
function save(s){(Sync.provider||LocalStorageProvider).persist(s);}

function uid(p='id'){return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);}
function newCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r;do{r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];}while(S.groups.some(g=>g.code===r));return r;}

function practiceQuestions(persona){const k=PERSONAS[persona]?persona:'lider_nao_familiar';const arr=[];PILLARS.forEach(p=>p.qs.forEach((qq,i)=>arr.push({id:p.id+'_'+i,pillar:p.id,pillarName:p.name,scale:qq.scale,p:qq.t[k]||qq.t.lider_nao_familiar})));return arr;}
function questionsFor(r){if(r.type==='termometro')return THERMO;if(r.type==='cluster')return CLUSTER_Q;return practiceQuestions(r.persona);}
function avg(a){return a.length?+(a.reduce((x,y)=>x+y,0)/a.length).toFixed(2):0;}
function calcScore(r){const v=Object.values(r.answers||{}).filter(x=>typeof x==='number');return avg(v);} // escala 1..5
function calcPillars(r){const out={};PILLARS.forEach(p=>{const vals=[];p.qs.forEach((_,i)=>{const x=r.answers?.[p.id+'_'+i];if(typeof x==='number')vals.push(x);});out[p.id]=vals.length?avg(vals):null;});return out;}
function completedPratica(gid){return S.responses.filter(r=>r.groupId===gid&&r.type==='pratica'&&r.status==='completed');}
// [PERMISSÃO] média dos demais só existe com 3+ respondentes concluídos no grupo
function othersAverage(gid,selfId){const all=completedPratica(gid);if(all.length<3)return null;const o=all.filter(r=>r.id!==selfId);return o.length?avg(o.map(calcScore)):null;}
function othersPillars(gid,selfId){const all=completedPratica(gid);if(all.length<3)return null;const o=all.filter(r=>r.id!==selfId);if(!o.length)return null;const out={};PILLARS.forEach(p=>{const vals=[];o.forEach(r=>{const x=calcPillars(r)[p.id];if(x!=null)vals.push(x);});out[p.id]=vals.length?avg(vals):null;});return out;}
function releasedAnalysis(gid){return S.analysis.find(a=>a.groupId===gid&&a.status==='released');}

function submitCadastro(flow,code){

 Object.assign(u,{name:data.name,email:data.email,phone:data.phone,company:data.company,position:data.position,persona:data.persona,consent:data.consent,updatedAt:now()});
 if(u.role!=='admin')u.role=data.persona==='socio'?'socio':'respondente';
 S.current=u.id;
 save(S);Sync.push('group',group);Sync.push('user',u);
 const existing=S.responses.find(r=>r.userId===u.id&&r.groupId===group.id&&r.type===flow&&r.status==='completed'&&!r.reopen);

 const r={id:uid('r'),type:flow,userId:u.id,groupId:group.id,persona:data.persona,status:'in_progress',answers:{},createdAt:now(),updatedAt:now(),reopen:false};

async function testConnection(){if(STORAGE_CONFIG.provider!=='sheets'||!STORAGE_CONFIG.scriptUrl){toast('Configure provider Sheets e Script URL');return;}
 setSyncStatus('Sincronizando');try{const r=await apiCall('GET','health');setSyncStatus(r&&r.ok?'Sincronizado':'Erro de sincronização');toast(r&&r.ok?('Conexão OK · v'+(r.version||'?')):'Falha na conexão');}catch(e){setSyncStatus('Offline/cache local');toast('Erro: '+e.message);}}
async function syncNow(){if(!Sync.isSheets()){toast('Provider Local: nada a sincronizar');return;}
 setSyncStatus('Sincronizando');
 try{const f=await GoogleSheetsProvider.flush();                     // envia pendências
  const data=await Sync.pull();                                     // [PERMISSÃO] adminBootstrap requer token
  if(data){mergeRemote(data);SyncState.remoteCounts={groups:(data.groups||[]).length,users:(data.users||[]).length,responses:(data.responses||[]).length};}
  SyncState.lastSync=now();setSyncStatus('Sincronizado');toast(`Sincronizado · ${f.sent} enviado(s), ${loadPending().length} pendência(s)`);renderAdminBody();
 }catch(e){setSyncStatus('Erro de sincronização');toast('Erro: '+e.message);}}
// Merge remoto -> local por id, resolvendo conflito pelo updatedAt mais recente.
function mergeRemote(data){['groups','users','responses','interviews','analysis'].forEach(coll=>{
  const remote=data[coll]||[];const byId=new Map(S[coll].map(x=>[x.id,x]));
  remote.forEach(rem=>{const loc=byId.get(rem.id);
    if(!loc)S[coll].push(rem);
    else if((rem.updatedAt||'')>(loc.updatedAt||''))Object.assign(loc,rem);});
 });save(S);}

   <label class="field"><span class="lab">Status</span><select id="i-status">${APROF_STATUS.map(s=>`<option ${i?.status===s?'selected':''}>${s}</option>`).join('')}</select></label></div>
   <details class="mb12"><summary class="small bold">Roteiro sugerido (núcleo comum + por persona)</summary>
     <div class="small muted mt8"><b>Núcleo comum</b><ol>${roteiroCore}</ol><b>Por persona</b><ol>${(APROF_PERSONA[persona]||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ol></div></details>
   <label class="field"><span class="lab">Transcrição / notas da entrevista</span><textarea id="i-notes">${esc(i?.notes||'')}</textarea></label>
   <label class="field"><span class="lab">Dores principais</span><textarea id="i-pain">${esc(i?.pain||'')}</textarea></label>
   <label class="field"><span class="lab">Hipóteses do consultor</span><textarea id="i-hyp">${esc(i?.hypotheses||'')}</textarea></label>
   <label class="field"><span class="lab">Divergências percebidas</span><textarea id="i-div">${esc(i?.divergences||'')}</textarea></label>
   <label class="field"><span class="lab">Próximo passo sugerido</span><textarea id="i-next">${esc(i?.next||'')}</textarea></label>
   <label class="field"><span class="lab">Plano inicial de trabalho</span><textarea id="i-plan">${esc(i?.plan||'')}</textarea></label>
   <button class="btn btn-primary block" onclick="saveInterview('${iid||''}')">Salvar aprofundamento</button>
 </div></div>`;
 iUsers(i?.userId);
}
function iUsers(preselect){const gid=val('i-group');const uids=[...new Set(S.responses.filter(r=>r.groupId===gid).map(r=>r.userId))];
 const sel=document.getElementById('i-user');if(!sel)return;
 sel.innerHTML=uids.map(id=>{const u=S.users.find(x=>x.id===id)||{};return `<option value="${id}" ${preselect===id?'selected':''}>${esc(u.name)} — ${esc(PERSONAS[u.persona]||u.persona)}</option>`;}).join('')||'<option value="">(sem respondentes)</option>';
}
function saveInterview(iid){const uidv=val('i-user'),u=S.users.find(x=>x.id===uidv)||{};
 const data={groupId:val('i-group'),userId:uidv,persona:val('i-persona'),cluster:val('i-cluster'),consultorName:val('i-consultor'),date:val('i-date'),pillars:val('i-pillars').split(',').map(x=>x.trim()).filter(Boolean),criticality:val('i-crit'),status:val('i-status'),notes:val('i-notes'),pain:val('i-pain'),hypotheses:val('i-hyp'),divergences:val('i-div'),next:val('i-next'),plan:val('i-plan'),updatedAt:now()};
 let iv;if(iid){iv=S.interviews.find(x=>x.id===iid);Object.assign(iv,data);}else{iv={id:uid('i'),createdAt:now(),consultorId:S.current,...data};S.interviews.push(iv);}
 save(S);Sync.push('interview',iv);closeModal();renderAdminBody();toast('Aprofundamento salvo');
}
function adminAnalysis(el){el.innerHTML=`<div class="grid2">
  <div class="card"><h3>Nova análise final</h3>
   <label class="field"><span class="lab">Grupo</span><select id="a-group">${S.groups.map(g=>`<option value="${g.id}">${esc(g.name)} (${g.code})</option>`).join('')}</select></label>
   <label class="field"><span class="lab">Análise consultiva final</span><textarea id="a-text" placeholder="Leitura consultiva, hipóteses, tensões, priorização e próximos passos..."></textarea></label>
   <label class="check mb12"><input id="a-release" type="checkbox"><span>Liberar para o perfil Sócio</span></label>
   <button class="btn btn-primary block" onclick="saveAnalysis()">Salvar análise</button></div>
  <div class="card"><h3>Análises salvas</h3>
   ${S.analysis.map(a=>{const g=S.groups.find(x=>x.id===a.groupId)||{};return `<div style="border-top:1px solid var(--line);padding:10px 0"><div class="flex between"><b>${esc(g.name)}</b><span class="pill ${a.status==='released'?'ok':'grey'}">${a.status}</span></div><div class="xs muted">${new Date(a.createdAt).toLocaleString('pt-BR')}</div><div class="small mt8" style="white-space:pre-wrap">${esc((a.text||'').slice(0,220))}${(a.text||'').length>220?'…':''}</div>${a.status!=='released'?`<button class="btn btn-outline btn-sm mt8" onclick="releaseAnalysis('${a.id}')">Liberar aos sócios</button>`:''}</div>`;}).join('')||'<div class="muted">Nenhuma análise.</div>'}
  </div></div>`;
}
function saveAnalysis(){const gid=val('a-group'),text=val('a-text');if(!gid||!text)return toast('Grupo e texto obrigatórios.');
 const an={id:uid('a'),groupId:gid,text,status:document.getElementById('a-release').checked?'released':'draft',createdAt:now(),updatedAt:now(),releasedAt:document.getElementById('a-release').checked?now():'',consultorId:S.current};S.analysis.push(an);save(S);Sync.push('analysis',an);renderAdminBody();toast('Análise salva');
}
function releaseAnalysis(aid){const a=S.analysis.find(x=>x.id===aid);a.status='released';a.releasedAt=now();a.updatedAt=now();save(S);Sync.push('analysis',a);renderAdminBody();toast('Análise liberada aos sócios');}
function adminBase(el){const users=S.users.filter(u=>u.role!=='admin');
 el.innerHTML=`<div class="notice mb16"><b>Base consolidada:</b> filtre por segmento, porte, persona, cidade, status e maturidade. Alimente com o cadastro complementar dos participantes.</div>
 <div class="table-wrap"><table><thead><tr><th>Nome</th><th>Empresa</th><th>Persona</th><th>Segmento</th><th>Faturamento</th><th>Colab.</th><th>Cidade/UF</th><th>Momento</th></tr></thead><tbody>
 ${users.map(u=>`<tr><td>${esc(u.name)}<div class="xs muted">${esc(u.email||'')}</div></td><td>${esc(u.company||'')}</td><td>${esc(PERSONAS[u.persona]||u.persona||'')}</td><td>${esc(u.segment||'—')}</td><td>${esc(u.revenue||'—')}</td><td>${esc(u.headcount||'—')}</td><td>${esc(u.city||'—')}</td><td>${esc(u.moment||'—')}</td></tr>`).join('')||'<tr><td colspan="8" class="muted">Sem participantes.</td></tr>'}
 </tbody></table></div>`;
}

/* --------------------------- Grupos / edição ----------------------------- */
function showCreateGroup(){document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
  <button class="btn btn-ghost btn-sm" style="float:right" onclick="closeModal()">✕</button>
  <h2>Criar grupo empresarial</h2>
  <label class="field"><span class="lab">Nome da empresa/grupo</span><input id="g-name"></label>
  <div class="grid2"><label class="field"><span class="lab">Segmento</span><select id="g-seg"><option></option>${SEGMENTS.map(s=>`<option>${s}</option>`).join('')}</select></label>
  <label class="field"><span class="lab">Faturamento</span><select id="g-rev"><option></option>${REVENUES.map(s=>`<option>${s}</option>`).join('')}</select></label></div>
  <button class="btn btn-primary block" onclick="createGroup()">Criar e gerar código</button>
 </div></div>`;}
function createGroup(){const name=val('g-name');if(!name)return toast('Informe o nome.');
 const g={id:uid('g'),code:newCode(),name,status:'active',segment:val('g-seg'),revenue:val('g-rev'),createdAt:now(),updatedAt:now()};S.groups.push(g);save(S);Sync.push('group',g);closeModal();renderAdminBody();toast('Grupo criado: '+g.code);
}
function editGroup(gid){const g=S.groups.find(x=>x.id===gid);if(!g)return;
 document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
  <button class="btn btn-ghost btn-sm" style="float:right" onclick="closeModal()">✕</button>
  <h2>Editar grupo</h2>
  <label class="field"><span class="lab">Nome</span><input id="eg-name" value="${esc(g.name)}"></label>
  <div class="grid2"><label class="field"><span class="lab">Segmento</span><select id="eg-seg"><option></option>${SEGMENTS.map(s=>`<option ${g.segment===s?'selected':''}>${s}</option>`).join('')}</select></label>
  <label class="field"><span class="lab">Status</span><select id="eg-status"><option ${g.status==='active'?'selected':''}>active</option><option ${g.status==='closed'?'selected':''}>closed</option></select></label></div>
  <button class="btn btn-primary block" onclick="saveGroup('${gid}')">Salvar</button>
 </div></div>`;}
function saveGroup(gid){const g=S.groups.find(x=>x.id===gid);Object.assign(g,{name:val('eg-name'),segment:val('eg-seg'),status:val('eg-status'),updatedAt:now()});save(S);Sync.push('group',g);closeModal();renderAdminBody();}
function editResponse(rid){const r=respById(rid);const qs=questionsFor(r);
 document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
  <button class="btn btn-ghost btn-sm" style="float:right" onclick="closeModal()">✕</button>
  <h2>Editar respostas</h2><p class="sub">Edição administrativa vinculada ao mesmo participante e grupo.</p>
  ${qs.map(qq=>{const sc=scaleOf(qq.scale);return `<label class="field"><span class="lab">${esc(qq.p)}</span><select id="er-${qq.id}">${sc.opts.map(o=>`<option value="${o.v}" ${r.answers[qq.id]===o.v?'selected':''}>${o.v} — ${esc(o.t)}</option>`).join('')}</select></label>`;}).join('')}
  <button class="btn btn-primary block" onclick="saveEditedResponse('${rid}')">Salvar edição</button>
 </div></div>`;}
function saveEditedResponse(rid){const r=respById(rid);questionsFor(r).forEach(qq=>{const v=document.getElementById('er-'+qq.id)?.value;if(v!=null)r.answers[qq.id]=Number(v);});r.score=calcScore(r);if(r.type==='cluster')r.cluster=clusterOf(r.score);r.updatedAt=now();save(S);Sync.push('response',r);closeModal();renderAdminBody();toast('Respostas atualizadas');}
function reopenResponse(rid){const r=respById(rid);r.status='in_progress';r.reopen=true;r.updatedAt=now();save(S);Sync.push('response',r);renderAdminBody();toast('Formulário reaberto para o participante.');}

/* ------------------------------ Export/Import ---------------------------- */
function exportJSON(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gobraz_assessment_v5_base.json';a.click();}
function importJSONModal(){document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
  <button class="btn btn-ghost btn-sm" style="float:right" onclick="closeModal()">✕</button>
  <h2>Importar base JSON</h2><div class="notice warn mb12">A importação substitui a base atual deste navegador.</div>
  <input type="file" id="jsonfile" accept="application/json">
  <button class="btn btn-primary block mt12" onclick="doImportJSON()">Importar</button>
 </div></div>`;}
function doImportJSON(){const f=document.getElementById('jsonfile').files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const obj=JSON.parse(rd.result);localStorage.setItem(STORE_KEY,JSON.stringify(obj));closeModal();toast('Base importada');setTimeout(()=>location.reload(),500);}catch{toast('JSON inválido');}};rd.readAsText(f);}

window.onpopstate=render;
// Bootstrap: inicializa o provider (health-check no modo Sheets) e então renderiza.
(async function boot(){
 try{await Sync.init();}catch(e){/* fallback silencioso para cache local */}
 render();
 // No modo Sheets, se já houver consultor logado, puxa a base consolidada.
 if(Sync.isSheets()&&STORAGE_CONFIG.adminToken){const u=currentUser();if(u&&isAdmin(u)){try{const d=await Sync.pull();if(d){mergeRemote(d);if(q().view==='consultor')render();}}catch{}}}
})();
</script>
</body>
