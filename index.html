<style>
:root{--blue:#2557B7;--blue2:#1A3D8F;--light:#EBF2FF;--bg:#F8FAFC;--card:#fff;--text:#111827;--muted:#6B7280;--border:#E5E7EB;--green:#10B981;--amber:#F59E0B;--red:#EF4444;--purple:#7C3AED;--shadow:0 8px 28px rgba(15,23,42,.08);--r:16px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;font-size:15px}button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:var(--blue);text-decoration:none}.hidden{display:none!important}
.header{height:64px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(37,87,183,.06)}
.logo{line-height:1;cursor:pointer}.logo .small{font-size:.82rem;font-weight:800;letter-spacing:.02em}.logo .big{display:inline-block;margin-top:2px;background:var(--blue);color:#fff;font-size:1.08rem;font-weight:900;padding:3px 9px;border-radius:5px}.hdr-actions{display:flex;gap:8px;align-items:center}.chip{border:1px solid var(--border);border-radius:999px;padding:6px 10px;background:#fff;color:var(--muted);font-size:.78rem}.wrap{max-width:1040px;margin:0 auto;padding:26px 16px}.narrow{max-width:760px}.hero{min-height:100vh;background:linear-gradient(155deg,#eef5ff 0%,#fff 58%,#f8fafc 100%);display:flex;align-items:center;justify-content:center;padding:28px 16px}.hero-card{background:#fff;border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:34px;max-width:760px;width:100%}.hero-logo{text-align:center;margin-bottom:20px}.hero-logo .small{font-size:1.6rem;font-weight:900}.hero-logo .big{display:inline-block;background:var(--blue);color:#fff;font-size:2.1rem;font-weight:900;padding:3px 16px;border-radius:8px}.hero h1{text-align:center;font-size:1.7rem;line-height:1.25;margin:10px 0}.hero p{text-align:center;color:var(--muted);line-height:1.65;margin:0 auto 22px;max-width:620px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:760px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.header{padding:0 12px}.hero-card{padding:24px 18px}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.03)}.card.soft{box-shadow:var(--shadow)}.card-title{font-size:1.08rem;font-weight:800;margin-bottom:6px}.card-sub{font-size:.86rem;color:var(--muted);line-height:1.55;margin-bottom:14px}.muted{color:var(--muted)}.small{font-size:.84rem}.xs{font-size:.74rem}.bold{font-weight:800}.center{text-align:center}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt22{margin-top:22px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.flex{display:flex}.between{justify-content:space-between}.centered{align-items:center}.gap8{gap:8px}.gap12{gap:12px}.wrapgap{flex-wrap:wrap}.hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.btn{border:0;border-radius:11px;padding:11px 17px;font-weight:800;font-size:.9rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s}.btn:hover{transform:translateY(-1px)}.btn-primary{background:var(--blue);color:white}.btn-primary:hover{background:var(--blue2)}.btn-secondary{background:var(--light);color:var(--blue);border:1px solid #c7d9f8}.btn-ghost{background:white;color:var(--muted);border:1px solid var(--border)}.btn-danger{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}.btn-sm{padding:7px 11px;font-size:.78rem;border-radius:9px}.btn-block{width:100%}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:.72rem;font-weight:800}.b-blue{background:var(--light);color:var(--blue)}.b-green{background:#ecfdf5;color:#065f46}.b-amber{background:#fffbeb;color:#92400e}.b-red{background:#fef2f2;color:#991b1b}.b-gray{background:#f3f4f6;color:#374151}.b-purple{background:#f5f3ff;color:#5b21b6}
.alert{padding:13px 15px;border-radius:12px;font-size:.86rem;line-height:1.55;margin-bottom:14px}.info{background:var(--light);border:1px solid #c7d9f8;color:#173B7A}.success{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46}.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
label{display:block;font-size:.8rem;font-weight:800;margin-bottom:6px}.req{color:var(--red)}input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;background:white;outline:none}textarea{min-height:100px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,87,183,.12)}.field{margin-bottom:14px}.hint{font-size:.74rem;color:var(--muted);margin-top:4px;line-height:1.4}.invalid{border-color:var(--red)!important}.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);overflow-x:auto;margin:18px 0}.tab{background:transparent;border:0;border-bottom:2px solid transparent;padding:11px 15px;margin-bottom:-2px;color:var(--muted);font-weight:800;white-space:nowrap}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.progress{height:8px;background:var(--border);border-radius:999px;overflow:hidden}.progress>div{height:100%;background:var(--blue);border-radius:999px}.q-card{border:1px solid var(--border);border-radius:15px;background:white;padding:18px;margin-bottom:14px}.q-text{font-weight:800;line-height:1.45;margin-bottom:13px}.scale{display:grid;gap:8px}.opt{display:flex;gap:11px;align-items:flex-start;border:1.5px solid var(--border);border-radius:12px;padding:11px 12px;cursor:pointer}.opt:hover{border-color:#93b4f5;background:#fafcff}.opt.selected{border-color:var(--blue);background:var(--light)}.opt input{width:17px;height:17px;accent-color:var(--blue);margin-top:2px}.opt .num{font-weight:900;color:var(--blue);min-width:18px}.opt .txt{font-size:.83rem;color:var(--muted);line-height:1.35}.score-big{font-size:3.4rem;font-weight:950;line-height:.9}.score-label{font-weight:900}.result-box{border:1px solid var(--border);border-radius:16px;background:white;padding:20px}.bar{height:7px;background:var(--border);border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:var(--blue)}table{width:100%;border-collapse:collapse;font-size:.84rem}th{text-align:left;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;background:#f9fafb}th,td{padding:10px 11px;border-bottom:1px solid var(--border);vertical-align:top}tr:hover td{background:#fbfdff}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px;background:white}.code{font-family:ui-monospace,Consolas,monospace;font-weight:900;color:var(--blue);letter-spacing:.08em}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:16px}.modal{background:white;border-radius:20px;padding:24px;max-width:560px;width:100%;max-height:92vh;overflow:auto}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#111827;color:white;border-radius:10px;padding:10px 16px;font-size:.84rem;z-index:100;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.mini-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:#fff}.stat{font-size:1.7rem;font-weight:950;color:var(--blue)}
</style>

<script>
const STORE_KEY='gd_assessment_v3';
const SCALE=[
 {v:0,t:'Não acontece na prática'},
 {v:1,t:'Acontece de forma informal e inconsistente'},
 {v:2,t:'Existe parcialmente, mas depende muito das pessoas'},
 {v:3,t:'Existe e é usado com frequência'},
 {v:4,t:'Está bem estruturado, é seguido e ajuda a empresa a evoluir'}
];
const PERSONAS={
 socio:'Sócio', sucessor:'Sucessor', lider_familiar:'Líder familiar', lider_nao_familiar:'Líder não familiar', consultor:'Consultor', outro:'Outro'
};
const ROLES={admin:'Admin',consultor:'Consultor',socio:'Sócio',respondente:'Respondente'};
const COMPANY_SIZES=['Até 10 pessoas','11 a 30 pessoas','31 a 100 pessoas','101 a 300 pessoas','301 a 1.000 pessoas','Acima de 1.000 pessoas'];
const REVENUES=['Até R$ 1MM','R$ 1MM a R$ 5MM','R$ 5MM a R$ 20MM','R$ 20MM a R$ 70MM','R$ 70MM a R$ 200MM','Acima de R$ 200MM','Prefiro não informar'];
const SEGMENTS=['Varejo','Franquias','Indústria','Serviços','Saúde','Educação','Construção/Infraestrutura','Tecnologia','Agronegócio','Outro'];
const THERMO=[
 {id:'t1',p:'A empresa tem clareza sobre suas prioridades para os próximos 12 meses.'},
 {id:'t2',p:'As pessoas sabem quem decide o quê nos temas importantes.'},
 {id:'t3',p:'A operação consegue avançar sem depender dos sócios a todo momento.'},
 {id:'t4',p:'As reuniões geram decisões claras, responsáveis e acompanhamento.'},
 {id:'t5',p:'Os principais indicadores são acompanhados e usados para decidir.'},
 {id:'t6',p:'A empresa está se preparando para continuidade, crescimento e sucessão.'}
];
const PILLARS=[
 {id:'direcao',name:'Direção e Prioridades',desc:'Clareza de rumo, prioridades e critérios de escolha.',qs:{
  socio:['Tenho clareza das prioridades reais da empresa para os próximos 12 meses.','As prioridades são comunicadas de forma que a liderança consiga agir.','As decisões estratégicas seguem critérios claros, não apenas urgência ou intuição.'],
  sucessor:['Entendo claramente quais são as prioridades da empresa para os próximos 12 meses.','Sei como meu papel atual contribui para essas prioridades.','Percebo critérios claros nas principais escolhas estratégicas.'],
  lider_familiar:['Consigo traduzir as prioridades da empresa em ações da minha área.','A relação familiar não confunde minha leitura sobre o que é prioridade.','As prioridades são suficientemente claras para orientar decisões do dia a dia.'],
  lider_nao_familiar:['Recebo clareza suficiente sobre as prioridades da empresa.','Consigo transformar as prioridades em metas e ações da minha área.','As mudanças de prioridade são explicadas com contexto e critério.'] }},
 {id:'papeis',name:'Papéis e Responsabilidades',desc:'Clareza sobre quem faz, decide, acompanha e presta contas.',qs:{
  socio:['Os papéis dos sócios, líderes e familiares estão claros na prática.','As lideranças sabem o que podem decidir sem consultar os sócios.','Quando há problemas relevantes, fica claro quem deve conduzir a solução.'],
  sucessor:['Meu papel atual na empresa é claro para mim e para os demais.','Tenho clareza sobre quais responsabilidades são minhas hoje.','Sei quais decisões posso tomar e quais ainda dependem dos sócios.'],
  lider_familiar:['Meu papel como liderança é claro e não se mistura com minha relação familiar.','As responsabilidades entre familiares e não familiares são tratadas com critérios profissionais.','Quando há problema na minha área, fica claro qual é minha responsabilidade.'],
  lider_nao_familiar:['Meu papel e minhas responsabilidades são claros na prática.','Tenho clareza sobre quais decisões posso tomar sem consultar os sócios.','A divisão de responsabilidades evita retrabalho, conflito ou zonas cinzentas.'] }},
 {id:'decisao',name:'Decisão e Autonomia',desc:'Capacidade de decidir sem centralização excessiva.',qs:{
  socio:['A empresa consegue tomar decisões importantes sem depender exclusivamente de mim ou de poucos sócios.','Delegamos decisões com clareza de limites, critérios e responsabilidades.','A autonomia das lideranças é compatível com a maturidade esperada para suas funções.'],
  sucessor:['Tenho espaço claro para participar de decisões compatíveis com meu estágio.','Existe caminho visível para ampliar minha autonomia na empresa.','As decisões sobre minha evolução são tratadas com critérios claros.'],
  lider_familiar:['Tenho autonomia real para decidir na minha área, com critérios claros.','Minhas decisões são avaliadas mais pelo mérito do que pela relação familiar.','A empresa evita centralizar decisões que poderiam estar na liderança.'],
  lider_nao_familiar:['Tenho autonomia real para decidir dentro da minha área.','Sei quando preciso envolver os sócios e quando posso seguir.','A empresa não trava excessivamente por dependência de aprovação dos sócios.'] }},
 {id:'execucao',name:'Ritmos de Gestão e Execução',desc:'Rotinas, reuniões, disciplina e acompanhamento.',qs:{
  socio:['As reuniões de gestão têm pauta, decisão, responsável e prazo.','As decisões tomadas são acompanhadas até virarem execução.','Existe uma rotina mínima de prestação de contas entre áreas e sócios.'],
  sucessor:['Participo ou acompanho rituais de gestão que ajudam a entender o negócio.','As reuniões em que participo geram clareza sobre próximos passos.','Vejo disciplina para acompanhar decisões e pendências.'],
  lider_familiar:['Minha área participa de rituais de gestão com disciplina e clareza.','As decisões das reuniões viram ações acompanhadas.','Consigo prestar contas de forma objetiva sobre avanços, problemas e prioridades.'],
  lider_nao_familiar:['As reuniões que envolvem minha área são produtivas e objetivas.','Saio das reuniões sabendo o que deve ser feito, por quem e até quando.','Existe acompanhamento consistente das decisões e planos de ação.'] }},
 {id:'indicadores',name:'Indicadores e Resultados',desc:'Uso de dados para acompanhar desempenho e corrigir rota.',qs:{
  socio:['Acompanhamos indicadores relevantes para entender a saúde do negócio.','Quando um resultado foge do esperado, buscamos causa e ação corretiva.','As metas orientam decisões, não apenas cobranças pontuais.'],
  sucessor:['Tenho acesso a indicadores que ajudam a entender o desempenho da empresa.','Entendo como minhas entregas se conectam com resultados do negócio.','Os resultados são discutidos com contexto e aprendizado.'],
  lider_familiar:['Minha área acompanha indicadores claros de desempenho.','Uso dados para explicar resultados e propor melhorias.','A avaliação de performance é baseada em critérios e evidências.'],
  lider_nao_familiar:['Tenho indicadores claros para acompanhar minha área.','Os dados são usados para tomar decisões e priorizar ações.','As metas são acompanhadas durante o período, não apenas no fechamento.'] }},
 {id:'pessoas',name:'Pessoas e Liderança',desc:'Preparação de lideranças, desenvolvimento e retenção.',qs:{
  socio:['Temos lideranças preparadas para sustentar o crescimento da empresa.','A empresa desenvolve pessoas-chave de forma intencional.','Não dependemos excessivamente de poucas pessoas para manter a operação rodando.'],
  sucessor:['Recebo desenvolvimento compatível com o papel que posso ocupar no futuro.','A empresa deixa claro o que espera de mim em comportamento, entrega e evolução.','Há conversas construtivas sobre preparo, desempenho e próximos passos.'],
  lider_familiar:['Tenho clareza sobre como meu desempenho como liderança é avaliado.','A empresa desenvolve líderes familiares e não familiares com critérios justos.','Consigo dar e receber feedbacks sem que a relação familiar atrapalhe.'],
  lider_nao_familiar:['Recebo orientação e feedback suficientes para evoluir como liderança.','A empresa tem critérios claros para avaliar desempenho de líderes.','Vejo espaço real para crescimento profissional dentro da empresa.'] }},
 {id:'continuidade',name:'Família, Continuidade e Sucessão',desc:'Separação entre família, propriedade e gestão; preparação para continuidade.',qs:{
  socio:['As relações familiares ou societárias não prejudicam decisões importantes da empresa.','Existem conversas ou combinados sobre sucessão e continuidade.','A remuneração, retirada e participação dos sócios seguem critérios suficientemente claros.'],
  sucessor:['Existe clareza sobre meu papel atual e possível papel futuro na empresa.','As conversas sobre sucessão são tratadas com maturidade e critérios.','Percebo separação saudável entre relações familiares e decisões profissionais.'],
  lider_familiar:['A empresa separa razoavelmente família, propriedade e gestão.','As oportunidades para familiares são tratadas com critérios claros.','Conflitos familiares não prejudicam de forma relevante a rotina da empresa.'],
  lider_nao_familiar:['As relações familiares ou societárias não atrapalham de forma relevante meu trabalho.','A empresa transmite segurança sobre continuidade e sucessão.','Percebo critérios profissionais na participação de familiares na gestão.'] }}
];
function defaultState(){return{version:3,users:[],groups:[],responses:[],interviews:[],analysis:[],current:null,audit:[],seeded:false}}
function load(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||defaultState()}catch{return defaultState()}}
function save(s){localStorage.setItem(STORE_KEY,JSON.stringify(s))}
let S=load();
function seed(){if(S.seeded)return;S.users.push({id:'u-admin',name:'Administrador',email:'admin@gestaododono.com.br',phone:'',role:'admin',persona:'consultor',createdAt:now()});S.seeded=true;save(S)}
function now(){return new Date().toISOString()}function id(p='id'){return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}
function code(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';do{r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)]}while(S.groups.some(g=>g.code===r));return r}
function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function qs(){return Object.fromEntries(new URLSearchParams(location.search).entries())}
function setRoute(params){const url=new URL(location.href);url.search='';Object.entries(params).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=='')url.searchParams.set(k,v)});history.pushState(null,'',url);render()}
function scoreColor(v){return v>=3.5?'#10B981':v>=2.5?'#2557B7':v>=1.5?'#F59E0B':'#EF4444'}
function resultLabel(v){if(v>=3.5)return'Boa base de gestão';if(v>=2.5)return'Gestão em estruturação';if(v>=1.5)return'Gestão ainda informal';return'Gestão muito dependente'}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function currentUser(){return S.current?S.users.find(u=>u.id===S.current):null}
function canSeeConsolidated(u){return u?.role==='admin'||u?.role==='consultor'||u?.role==='socio'||u?.isSocio}
function isAdmin(u){return u?.role==='admin'||u?.role==='consultor'}
function groupByCode(c){return S.groups.find(g=>g.code===String(c||'').toUpperCase())}
function respById(rid){return S.responses.find(r=>r.id===rid)}
function userByEmail(email){return S.users.find(u=>u.email?.toLowerCase()===String(email||'').toLowerCase())}
function completedDetailed(groupId){return S.responses.filter(r=>r.groupId===groupId&&r.type==='detalhada'&&r.status==='completed')}
function calcResponse(r){const vals=Object.values(r.answers||{}).filter(x=>typeof x==='number');return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):0}
function calcPillars(r){let out={};PILLARS.forEach(p=>{const vals=[];for(let i=0;i<3;i++){const k=p.id+'_'+i;if(typeof r.answers?.[k]==='number')vals.push(r.answers[k])}out[p.id]=vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):null});return out}
function othersAverage(groupId,selfId){const all=completedDetailed(groupId);if(all.length<3)return null;const others=all.filter(r=>r.id!==selfId);if(!others.length)return null;const vals=others.map(calcResponse);return +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)}
function avgPillars(groupId,selfId){const all=completedDetailed(groupId);if(all.length<3)return null;const others=all.filter(r=>r.id!==selfId);if(!others.length)return null;const out={};PILLARS.forEach(p=>{const vals=[];others.forEach(r=>{const ps=calcPillars(r)[p.id];if(ps!=null)vals.push(ps)});out[p.id]=vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):null});return out}
function getOrCreateGroup(company, extra={}){let g=S.groups.find(x=>x.name?.toLowerCase()===company.toLowerCase());if(!g){g={id:id('g'),code:code(),name:company,status:'active',createdAt:now(),...extra};S.groups.push(g);save(S)}return g}
function renderHeader(){const u=currentUser();const h=document.getElementById('header');if(!u){h.innerHTML='';return}h.innerHTML=`<div class="header"><div class="logo" onclick="setRoute({})"><div class="small">Gestão de</div><div class="big">Dono</div></div><div class="hdr-actions"><span class="chip">${esc(u.name)} · ${esc(ROLES[u.role]||u.role)}</span>${isAdmin(u)?'<button class="btn btn-secondary btn-sm" onclick="setRoute({admin:\'1\'})">Painel admin</button>':''}<button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button></div></div>`}
function logout(){S.current=null;save(S);setRoute({})}
function render(){S=load();seed();renderHeader();const p=qs(),u=currentUser();if(p.admin)return u?renderAdmin():renderAdminLogin();if(p.result)return u?renderResult(p.result):renderIdentify('resultado',p);if(p.flow==='termometro')return renderIdentify('termometro',p);if(p.flow==='detalhada')return renderIdentify('detalhada',p);if(p.flow==='termometro_form'||p.flow==='detalhada_form')return u?renderForm(p.rid):renderLanding();if(p.flow==='aprofundamento')return u&&isAdmin(u)?renderInterview(p):renderAdminLogin();if(u)return u.role==='admin'||u.role==='consultor'?renderAdmin():renderClientHome();return renderLanding()}
function renderLanding(){document.getElementById('app').innerHTML=`<div class="hero"><div class="hero-card"><div class="hero-logo"><div class="small">Gestão de</div><div class="big">Dono</div></div><h1>Leitura de maturidade da gestão para empresas de dono</h1><p>Este protótipo funciona por links de jornada. Clientes não veem um menu de blocos; cada convite direciona para a experiência correta.</p><div class="grid2"><div class="card"><div class="card-title">Acesso por convite</div><div class="card-sub">Use o link recebido para responder o termômetro ou a avaliação detalhada.</div><button class="btn btn-primary btn-block" onclick="setRoute({flow:'termometro'})">Responder termômetro público</button></div><div class="card"><div class="card-title">Admin / consultor</div><div class="card-sub">Criar grupos, gerar links, ver respostas, reabrir formulários e registrar aprofundamentos.</div><button class="btn btn-secondary btn-block" onclick="setRoute({admin:'1'})">Entrar como admin</button></div></div><div class="alert warn mt16"><b>Protótipo localStorage:</b> dados ficam neste navegador. Use exportar/importar JSON para consolidar bases entre máquinas.</div></div></div>`}
function renderAdminLogin(){document.getElementById('app').innerHTML=`<div class="hero"><div class="hero-card" style="max-width:480px"><div class="hero-logo"><div class="small">Gestão de</div><div class="big">Dono</div></div><h1>Acesso admin</h1><div id="err"></div><div class="field"><label>E-mail</label><input id="adm-email" value="admin@gestaododono.com.br"></div><div class="field"><label>Senha</label><input id="adm-pass" type="password" value="admin123" onkeydown="if(event.key==='Enter')adminLogin()"></div><button class="btn btn-primary btn-block" onclick="adminLogin()">Entrar</button><button class="btn btn-ghost btn-block mt8" onclick="setRoute({})">Voltar</button></div></div>`}
function adminLogin(){const email=document.getElementById('adm-email').value.trim().toLowerCase(), pass=document.getElementById('adm-pass').value;if(email==='admin@gestaododono.com.br'&&pass==='admin123'){S.current='u-admin';save(S);setRoute({admin:'1'});return}document.getElementById('err').innerHTML='<div class="alert error">Credenciais inválidas. Demo: admin@gestaododono.com.br / admin123</div>'}
function renderIdentify(flow,p){const codeParam=(p.codigo||'').toUpperCase();const group=codeParam?groupByCode(codeParam):null;const persona=p.persona&&PERSONAS[p.persona]?p.persona:'';const title=flow==='termometro'?'Antes de começar o termômetro':flow==='detalhada'?'Antes de começar a avaliação detalhada':'Identificação';const desc=flow==='termometro'?'Cadastro curto para liberar a leitura rápida. Depois, ao visualizar resultados consolidados, você poderá complementar dados para benchmarks anonimizados.':'Cadastro curto para vincular sua resposta ao grupo empresarial correto.';document.getElementById('app').innerHTML=`<div class="wrap narrow"><div class="card soft"><div class="badge b-blue mb12">${flow==='termometro'?'Termômetro':'Avaliação detalhada'}</div><div class="card-title">${title}</div><div class="card-sub">${desc}</div>${group?`<div class="alert info">Grupo identificado: <b>${esc(group.name)}</b> · código <span class="code">${esc(group.code)}</span></div>`:flow==='detalhada'?`<div class="alert warn">Nenhum código de grupo foi informado. O sistema criará um grupo a partir do nome da empresa.</div>`:''}<div id="form-err"></div><div class="grid2"><div class="field"><label>Nome completo <span class="req">*</span></label><input id="name"></div><div class="field"><label>E-mail <span class="req">*</span></label><input id="email" type="email"></div></div><div class="grid2"><div class="field"><label>WhatsApp <span class="req">*</span></label><input id="phone" placeholder="(00) 00000-0000"></div><div class="field"><label>Empresa <span class="req">*</span></label><input id="company" value="${esc(group?.name||'')}"></div></div><div class="grid2"><div class="field"><label>Cargo / função <span class="req">*</span></label><input id="position"></div><div class="field"><label>Persona nesta resposta <span class="req">*</span></label><select id="persona"><option value="">Selecione...</option>${Object.entries(PERSONAS).filter(([k])=>k!=='consultor').map(([k,v])=>`<option value="${k}" ${persona===k?'selected':''}>${v}</option>`).join('')}</select><div class="hint">A persona direciona as perguntas da avaliação detalhada.</div></div></div><div class="grid2"><div class="field"><label>Você é sócio(a) da empresa? <span class="req">*</span></label><select id="isSocio"><option value="">Selecione...</option><option value="1">Sim</option><option value="0">Não</option></select></div><div class="field"><label>Área de atuação</label><input id="area" placeholder="Ex.: Comercial, Operações, Financeiro..."></div></div><label style="display:flex;gap:9px;align-items:flex-start;font-weight:600"><input id="consent" type="checkbox" style="width:auto;margin-top:3px"> <span class="small muted">Autorizo o uso das respostas para análise de maturidade da gestão. Resultados de benchmarking, quando houver, serão disponibilizados de forma anonimizada.</span></label><div class="alert info mt16"><b>Construção coletiva de saberes:</b> depois do resultado, você poderá completar o cadastro. À medida que outros empresários responderem, visões anonimizadas poderão ajudar a entender sua posição versus outros grupos empresariais.</div><button class="btn btn-primary btn-block mt16" onclick="submitIdentify('${flow}','${esc(codeParam)}')">Continuar</button></div></div>`}
function submitIdentify(flow,codeParam){const get=x=>document.getElementById(x).value.trim();const data={name:get('name'),email:get('email').toLowerCase(),phone:get('phone'),company:get('company'),position:get('position'),persona:get('persona'),isSocio:get('isSocio')==='1',area:get('area'),consent:document.getElementById('consent').checked};let missing=['name','email','phone','company','position','persona'].filter(k=>!data[k]);if(missing.length||!data.consent||!data.email.includes('@')){document.getElementById('form-err').innerHTML='<div class="alert error">Preencha os campos obrigatórios, informe um e-mail válido e aceite o uso das informações.</div>';return}let group=codeParam?groupByCode(codeParam):null;if(!group)group=getOrCreateGroup(data.company);let u=userByEmail(data.email);if(!u){u={id:id('u'),role:data.isSocio?'socio':'respondente',createdAt:now()};S.users.push(u)}Object.assign(u,data,{role:u.role==='admin'?'admin':data.isSocio?'socio':'respondente',updatedAt:now()});S.current=u.id;let existing=S.responses.find(r=>r.userId===u.id&&r.groupId===group.id&&r.type===flow&&r.status==='completed'&&!r.reopen);save(S);if(existing){setRoute({result:existing.id});return}const r={id:id('r'),type:flow,userId:u.id,groupId:group.id,persona:data.persona,status:'in_progress',answers:{},createdAt:now(),updatedAt:now(),reopen:false};S.responses.push(r);save(S);if(flow==='termometro')setRoute({flow:'termometro_form',rid:r.id});else setRoute({flow:'detalhada_form',rid:r.id});renderForm(r.id)}
function renderForm(rid){const p=qs();const r=respById(rid||p.rid);if(!r)return setRoute({});const u=S.users.find(x=>x.id===r.userId),g=S.groups.find(x=>x.id===r.groupId);const isThermo=r.type==='termometro';const questions=isThermo?THERMO:buildDetailedQuestions(r.persona);const answered=Object.keys(r.answers||{}).length;const pct=Math.round(answered/questions.length*100);document.getElementById('app').innerHTML=`<div class="wrap narrow"><div class="flex between centered mb12"><div><div class="badge ${isThermo?'b-blue':'b-purple'}">${isThermo?'Termômetro':'Avaliação detalhada'}</div><h2 style="margin:8px 0 4px">${isThermo?'Leitura rápida de gestão':'Avaliação detalhada por percepção'}</h2><div class="small muted">${esc(g.name)} · ${esc(PERSONAS[r.persona]||r.persona)} · ${pct}% concluído</div></div><span class="code">${esc(g.code)}</span></div><div class="progress mb16"><div style="width:${pct}%"></div></div><div class="alert info">Responda com base no que acontece na prática na maior parte do tempo, não no que seria ideal.</div>${questions.map((q,i)=>renderQ(r,q,i)).join('')}<button class="btn btn-primary btn-block" onclick="finishResponse('${r.id}')">Finalizar e ver resultado</button></div>`;questions.forEach(q=>{SCALE.forEach(o=>{const el=document.getElementById(`q_${q.id}_${o.v}`);if(el)el.onchange=()=>{r.answers[q.id]=o.v;r.updatedAt=now();save(S);renderForm(r.id)}})})}
function buildDetailedQuestions(persona){const key=PERSONAS[persona]?persona:'lider_nao_familiar';let arr=[];PILLARS.forEach(p=>{(p.qs[key]||p.qs.lider_nao_familiar).forEach((text,i)=>arr.push({id:p.id+'_'+i,pillar:p.id,pillarName:p.name,p:text}))});return arr}
function renderQ(r,q,i){const val=r.answers?.[q.id];return `<div class="q-card"><div class="xs muted bold mb8">${q.pillarName?esc(q.pillarName):'Pergunta '+(i+1)}</div><div class="q-text">${i+1}. ${esc(q.p)}</div><div class="scale">${SCALE.map(o=>`<label class="opt ${val===o.v?'selected':''}"><input type="radio" id="q_${q.id}_${o.v}" name="${q.id}" ${val===o.v?'checked':''}><div class="num">${o.v}</div><div class="txt">${esc(o.t)}</div></label>`).join('')}</div></div>`}
function finishResponse(rid){const r=respById(rid);const total=r.type==='termometro'?THERMO.length:buildDetailedQuestions(r.persona).length;if(Object.keys(r.answers||{}).length<total){toast('Responda todas as perguntas antes de finalizar.');return}r.status='completed';r.completedAt=now();r.reopen=false;save(S);setRoute({result:r.id})}
function renderResult(rid){const r=respById(rid);if(!r)return setRoute({});const u=currentUser(),owner=S.users.find(x=>x.id===r.userId),g=S.groups.find(x=>x.id===r.groupId);if(!u||(!isAdmin(u)&&u.id!==r.userId&&!canSeeConsolidated(u)))return renderIdentify('resultado',{result:rid});const sc=calcResponse(r),isThermo=r.type==='termometro';const otherAvg=!isThermo?othersAverage(g.id,r.id):null;const ps=!isThermo?calcPillars(r):null;const ops=!isThermo?avgPillars(g.id,r.id):null;const final=S.analysis.find(a=>a.groupId===g.id&&a.status==='released');document.getElementById('app').innerHTML=`<div class="wrap"><div class="result-box soft"><div class="flex between centered wrapgap gap12"><div><div class="badge ${isThermo?'b-blue':'b-purple'}">${isThermo?'Resultado do termômetro':'Resultado da avaliação detalhada'}</div><h2 style="margin:8px 0 4px">${esc(g.name)}</h2><div class="small muted">Respondente: ${esc(owner.name)} · ${esc(PERSONAS[r.persona]||r.persona)} · código <span class="code">${esc(g.code)}</span></div></div><div class="center"><div class="score-big" style="color:${scoreColor(sc)}">${sc.toFixed(1)}</div><div class="small muted">/ 4,0</div></div></div><div class="alert ${sc>=2.5?'info':'warn'} mt16"><b>${resultLabel(sc)}.</b> ${isThermo?thermoText(sc):detailedText(sc,otherAvg)}</div>${!isThermo&&otherAvg!=null?`<div class="grid2 mt16"><div class="mini-card"><div class="xs muted bold">Sua nota</div><div class="stat" style="color:${scoreColor(sc)}">${sc.toFixed(1)}</div></div><div class="mini-card"><div class="xs muted bold">Média dos demais respondentes</div><div class="stat" style="color:${scoreColor(otherAvg)}">${otherAvg.toFixed(1)}</div><div class="xs muted">Exibida apenas com 3+ respondentes concluídos no grupo.</div></div></div><canvas id="radar" class="mt16" style="max-height:360px"></canvas>`:!isThermo?`<div class="alert info mt16">A média dos demais será exibida quando houver pelo menos 3 respondentes concluídos neste grupo. Isso protege a privacidade e melhora a qualidade da comparação.</div>`:''}${final&&canSeeConsolidated(u)?`<div class="card mt16"><div class="badge b-green mb8">Análise final liberada pelo consultor</div><div style="white-space:pre-wrap;line-height:1.65">${esc(final.text)}</div></div>`:''}<div class="grid2 mt16"><div class="card"><div class="card-title">Convidar outra pessoa do grupo</div><div class="card-sub">A leitura fica mais rica quando outros sócios, sucessores e lideranças respondem no mesmo código empresarial.</div><button class="btn btn-primary btn-block" onclick="showInvite('${g.code}')">Gerar link de convite</button></div><div class="card"><div class="card-title">Complete seu cadastro</div><div class="card-sub">Ajude a construir uma base coletiva de saberes. À medida que outros empresários respondam, visões anonimizadas poderão comparar sua posição versus outros grupos empresariais.</div><button class="btn btn-secondary btn-block" onclick="showComplement('${owner.id}')">Completar cadastro para benchmark</button></div></div>${!isThermo?pillarTable(ps,ops):''}<div class="mt16 flex gap8 wrapgap"><button class="btn btn-ghost" onclick="setRoute({})">Início</button>${isAdmin(u)?`<button class="btn btn-secondary" onclick="setRoute({admin:'1',tab:'responses'})">Voltar ao admin</button>`:''}</div></div></div>`;if(!isThermo&&otherAvg!=null)drawRadar(ps,ops)}
function thermoText(sc){if(sc>=3.5)return'Sua empresa mostra bons sinais de organização. A próxima pergunta é se essa percepção é compartilhada por outras pessoas-chave.';if(sc>=2.5)return'Sua empresa parece estar em estruturação. O próximo passo é entender onde há alinhamento ou divergência entre sócios e lideranças.';if(sc>=1.5)return'Há sinais de informalidade relevante. A avaliação detalhada pode revelar se o gargalo está em papéis, decisão, execução ou continuidade.';return'O resultado sugere forte dependência de pessoas-chave. Vale aprofundar a leitura antes que a gestão vire limite para crescimento.'}
function detailedText(sc,otherAvg){let base=sc>=2.5?'Sua percepção indica bases importantes de gestão, mas o valor consultivo está em comparar como outras pessoas-chave enxergam os mesmos temas.':'Sua percepção aponta oportunidades relevantes de evolução. O próximo passo é entender causas, exemplos concretos e diferenças de percepção.';if(otherAvg!=null){const diff=Math.abs(sc-otherAvg);if(diff>=.7)base+=' Há uma diferença relevante entre sua nota e a média dos demais, o que pode indicar desalinhamento de percepção ou comunicação.';else base+=' Sua nota está próxima da média dos demais, sugerindo maior alinhamento geral de percepção.'}return base}
function pillarTable(ps,ops){if(!ps)return'';return `<div class="card mt16"><div class="card-title">Leitura por pilar</div><div class="card-sub">Para sócios, a plataforma mostra apenas sua visão versus média dos demais. Não há quebra por persona nem respostas individuais de terceiros.</div><div class="table-wrap"><table><thead><tr><th>Pilar</th><th>Sua nota</th><th>Média dos demais</th><th></th></tr></thead><tbody>${PILLARS.map(p=>{const v=ps[p.id],o=ops?ops[p.id]:null;return `<tr><td><b>${esc(p.name)}</b><div class="xs muted">${esc(p.desc)}</div></td><td><b style="color:${scoreColor(v)}">${v?.toFixed(1)||'—'}</b></td><td>${o!=null?`<b style="color:${scoreColor(o)}">${o.toFixed(1)}</b>`:'—'}</td><td><div class="bar"><span style="width:${(v/4)*100}%;background:${scoreColor(v)}"></span></div></td></tr>`}).join('')}</tbody></table></div></div>`}
function drawRadar(ps,ops){const ctx=document.getElementById('radar');if(!ctx)return;new Chart(ctx,{type:'radar',data:{labels:PILLARS.map(p=>p.name),datasets:[{label:'Sua nota',data:PILLARS.map(p=>ps[p.id]||0),borderColor:'#2557B7',backgroundColor:'rgba(37,87,183,.15)',pointBackgroundColor:'#2557B7'},{label:'Média dos demais',data:PILLARS.map(p=>ops?.[p.id]||0),borderColor:'#10B981',backgroundColor:'rgba(16,185,129,.08)',pointBackgroundColor:'#10B981',borderDash:[5,3]}]},options:{scales:{r:{min:0,max:4,ticks:{stepSize:1}}},plugins:{legend:{position:'bottom'}}}})}
function showInvite(c){const base=location.origin+location.pathname;document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="card-title">Convite para outro respondente</div><div class="card-sub">Compartilhe o link mantendo o mesmo código empresarial <span class="code">${esc(c)}</span>.</div>${Object.entries(PERSONAS).filter(([k])=>!['consultor','outro'].includes(k)).map(([k,v])=>{const url=`${base}?flow=detalhada&codigo=${c}&persona=${k}`;return `<div class="mini-card mb8"><div class="flex between centered gap8"><div><b>${v}</b><div class="xs muted">${esc(url)}</div></div><button class="btn btn-secondary btn-sm" onclick="copy('${esc(url)}')">Copiar</button></div></div>`}).join('')}<button class="btn btn-ghost btn-block mt12" onclick="closeModal()">Fechar</button></div></div>`}
function showComplement(uid){const u=S.users.find(x=>x.id===uid)||currentUser();document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="card-title">Completar cadastro para benchmarks anonimizados</div><div class="card-sub">Esses dados ajudam a construir visões coletivas por segmento, porte e contexto, sem expor respostas individuais.</div><div class="grid2"><div class="field"><label>Segmento</label><select id="c-segment"><option></option>${SEGMENTS.map(x=>`<option ${u.segment===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Tamanho da empresa</label><select id="c-size"><option></option>${COMPANY_SIZES.map(x=>`<option ${u.companySize===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="grid2"><div class="field"><label>Faixa de faturamento</label><select id="c-revenue"><option></option>${REVENUES.map(x=>`<option ${u.revenue===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Cidade/UF</label><input id="c-city" value="${esc(u.city||'')}"></div></div><div class="grid2"><div class="field"><label>Empresa familiar?</label><select id="c-family"><option></option><option ${u.familyBusiness==='Sim'?'selected':''}>Sim</option><option ${u.familyBusiness==='Não'?'selected':''}>Não</option></select></div><div class="field"><label>Geração atual</label><select id="c-generation"><option></option><option ${u.generation==='1ª geração'?'selected':''}>1ª geração</option><option ${u.generation==='2ª geração'?'selected':''}>2ª geração</option><option ${u.generation==='3ª geração ou mais'?'selected':''}>3ª geração ou mais</option></select></div></div><button class="btn btn-primary btn-block" onclick="saveComplement('${u.id}')">Salvar complemento</button><button class="btn btn-ghost btn-block mt8" onclick="closeModal()">Agora não</button></div></div>`}
function saveComplement(uid){const u=S.users.find(x=>x.id===uid);if(!u)return;Object.assign(u,{segment:val('c-segment'),companySize:val('c-size'),revenue:val('c-revenue'),city:val('c-city'),familyBusiness:val('c-family'),generation:val('c-generation'),benchmarkCompletedAt:now()});save(S);closeModal();toast('Cadastro complementar salvo.')}function val(id){return document.getElementById(id)?.value.trim()||''}
function closeModal(){document.getElementById('modal-root').innerHTML=''}function copy(x){navigator.clipboard?.writeText(x);toast('Link copiado')}

function renderInterview(p){adminTabState='interviews';setRoute({admin:'1',tab:'interviews'});}

function renderClientHome(){const u=currentUser();const mine=S.responses.filter(r=>r.userId===u.id);document.getElementById('app').innerHTML=`<div class="wrap"><h2>Minhas respostas</h2><div class="grid2">${mine.map(r=>{const g=S.groups.find(x=>x.id===r.groupId);return `<div class="card"><div class="badge ${r.type==='termometro'?'b-blue':'b-purple'}">${r.type}</div><div class="card-title mt8">${esc(g?.name)}</div><div class="card-sub">${esc(PERSONAS[r.persona]||r.persona)} · ${r.status==='completed'?'Concluído':'Em andamento'}</div><button class="btn btn-secondary btn-block" onclick="${r.status==='completed'?`setRoute({result:'${r.id}'})`:`renderForm('${r.id}')`}">${r.status==='completed'?'Ver resultado':'Continuar'}</button></div>`}).join('')||'<div class="card">Nenhuma resposta encontrada.</div>'}</div></div>`}
let adminTabState='overview';
let responseFilters={group:'',persona:'',segment:'',size:''};
function renderAdmin(){const p=qs();adminTabState=p.tab||adminTabState;const tabs=['overview','groups','responses','interviews','analysis','data'];document.getElementById('app').innerHTML=`<div class="wrap"><div class="flex between centered wrapgap gap12"><div><h2 style="margin-bottom:4px">Painel Admin</h2><div class="small muted">Gestão dos grupos, respondentes, aprofundamentos e base consolidada.</div></div><div class="flex gap8 wrapgap"><button class="btn btn-secondary btn-sm" onclick="showCreateGroup()">+ Grupo</button><button class="btn btn-ghost btn-sm" onclick="exportJSON()">Exportar JSON</button><button class="btn btn-ghost btn-sm" onclick="importJSONModal()">Importar JSON</button></div></div><div class="tabs">${tabs.map(t=>`<button class="tab ${adminTabState===t?'active':''}" onclick="adminTabState='${t}';setRoute({admin:'1',tab:'${t}'})">${tabName(t)}</button>`).join('')}</div><div id="admin-body"></div></div>`;renderAdminBody()}
function tabName(t){return{overview:'Visão geral',groups:'Grupos',responses:'Respondentes e respostas',interviews:'Aprofundamentos',analysis:'Análise final',data:'Base consolidada'}[t]}
function renderAdminBody(){const el=document.getElementById('admin-body');if(adminTabState==='overview')return adminOverview(el);if(adminTabState==='groups')return adminGroups(el);if(adminTabState==='responses')return adminResponses(el);if(adminTabState==='interviews')return adminInterviews(el);if(adminTabState==='analysis')return adminAnalysis(el);if(adminTabState==='data')return adminData(el)}
function adminOverview(el){const leads=S.responses.filter(r=>r.type==='termometro').length, det=completedDetailed(null).length;el.innerHTML=`<div class="grid4"><div class="card"><div class="stat">${S.groups.length}</div><div class="small muted">Grupos</div></div><div class="card"><div class="stat">${S.users.filter(u=>u.role!=='admin').length}</div><div class="small muted">Respondentes</div></div><div class="card"><div class="stat">${leads}</div><div class="small muted">Termômetros</div></div><div class="card"><div class="stat">${S.interviews.length}</div><div class="small muted">Aprofundamentos</div></div></div><div class="alert info mt16"><b>Funil consultivo:</b> termômetro → avaliação detalhada → convite a novos respondentes → aprofundamento → análise final liberada aos sócios.</div><div class="card mt16"><div class="card-title">Grupos com maior potencial de aprofundamento</div>${S.groups.map(g=>{const rs=completedDetailed(g.id);const avg=rs.length?+(rs.map(calcResponse).reduce((a,b)=>a+b,0)/rs.length).toFixed(2):null;return `<div class="mini-card mb8"><div class="flex between centered"><div><b>${esc(g.name)}</b><div class="xs muted">${rs.length} avaliação(ões) detalhada(s) concluída(s) · código <span class="code">${esc(g.code)}</span></div></div><div class="bold" style="color:${avg!=null?scoreColor(avg):'#6B7280'}">${avg!=null?avg.toFixed(1):'—'}</div></div></div>`}).join('')||'<div class="muted">Nenhum grupo.</div>'}</div>`}
function completedDetailed(groupId){return S.responses.filter(r=>(!groupId||r.groupId===groupId)&&r.type==='detalhada'&&r.status==='completed')}
function adminGroups(el){el.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Grupo</th><th>Código</th><th>Status</th><th>Respondentes</th><th>Links</th><th>Ações</th></tr></thead><tbody>${S.groups.map(g=>{const rs=S.responses.filter(r=>r.groupId===g.id);return `<tr><td><b>${esc(g.name)}</b><div class="xs muted">${esc(g.segment||'')}</div></td><td><span class="code">${esc(g.code)}</span></td><td><span class="badge ${g.status==='active'?'b-green':'b-amber'}">${esc(g.status)}</span></td><td>${rs.length}</td><td><button class="btn btn-secondary btn-sm" onclick="showInvite('${g.code}')">Convites</button></td><td><button class="btn btn-ghost btn-sm" onclick="editGroup('${g.id}')">Editar</button></td></tr>`}).join('')}</tbody></table></div>`}
function adminResponses(el){const filters=`<div class="grid4 mb12"><select id="f-group" onchange="responseFilters.group=this.value;adminResponses(document.getElementById('admin-body'))"><option value="">Todos os grupos</option>${S.groups.map(g=>`<option value="${g.id}" ${responseFilters.group===g.id?'selected':''}>${esc(g.name)}</option>`).join('')}</select><select id="f-persona" onchange="responseFilters.persona=this.value;adminResponses(document.getElementById('admin-body'))"><option value="">Todas personas</option>${Object.entries(PERSONAS).map(([k,v])=>`<option value="${k}" ${responseFilters.persona===k?'selected':''}>${v}</option>`).join('')}</select><select id="f-segment" onchange="responseFilters.segment=this.value;adminResponses(document.getElementById('admin-body'))"><option value="">Todos segmentos</option>${SEGMENTS.map(x=>`<option ${responseFilters.segment===x?'selected':''}>${x}</option>`).join('')}</select><select id="f-size" onchange="responseFilters.size=this.value;adminResponses(document.getElementById('admin-body'))"><option value="">Todos portes</option>${COMPANY_SIZES.map(x=>`<option ${responseFilters.size===x?'selected':''}>${x}</option>`).join('')}</select></div>`;const fg=responseFilters.group,fp=responseFilters.persona,fs=responseFilters.segment,fz=responseFilters.size;let rows=S.responses.filter(r=>!fg||r.groupId===fg).filter(r=>!fp||r.persona===fp).filter(r=>{const u=S.users.find(x=>x.id===r.userId)||{};return(!fs||u.segment===fs)&&(!fz||u.companySize===fz)});el.innerHTML=filters+`<div class="table-wrap"><table><thead><tr><th>Respondente</th><th>Grupo</th><th>Tipo</th><th>Persona</th><th>Status</th><th>Nota</th><th>Ações</th></tr></thead><tbody>${rows.map(r=>{const u=S.users.find(x=>x.id===r.userId)||{},g=S.groups.find(x=>x.id===r.groupId)||{};return `<tr><td><b>${esc(u.name)}</b><div class="xs muted">${esc(u.email)} · ${esc(u.position||'')}</div></td><td>${esc(g.name)}<div class="xs code">${esc(g.code)}</div></td><td>${r.type}</td><td>${esc(PERSONAS[r.persona]||r.persona)}</td><td><span class="badge ${r.status==='completed'?'b-green':'b-amber'}">${r.status}</span></td><td>${r.status==='completed'?calcResponse(r).toFixed(1):'—'}</td><td class="flex gap8 wrapgap"><button class="btn btn-secondary btn-sm" onclick="setRoute({result:'${r.id}'})">Ver</button><button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">Cadastro</button><button class="btn btn-ghost btn-sm" onclick="editResponse('${r.id}')">Editar resposta</button><button class="btn btn-ghost btn-sm" onclick="reopenResponse('${r.id}')">Reabrir</button></td></tr>`}).join('')}</tbody></table></div>`}
function adminInterviews(el){el.innerHTML=`<div class="alert info">O aprofundamento é preenchido pelo consultor/admin e fica vinculado ao mesmo código empresarial, preservando a leitura consolidada do grupo.</div><button class="btn btn-primary btn-sm mb12" onclick="newInterviewModal()">+ Registrar aprofundamento</button><div class="table-wrap"><table><thead><tr><th>Grupo</th><th>Respondente</th><th>Pilares</th><th>Criticidade</th><th>Data</th><th>Ações</th></tr></thead><tbody>${S.interviews.map(i=>{const g=S.groups.find(x=>x.id===i.groupId)||{},u=S.users.find(x=>x.id===i.userId)||{};return `<tr><td>${esc(g.name)}<div class="xs code">${esc(g.code)}</div></td><td>${esc(u.name)}<div class="xs muted">${esc(PERSONAS[i.persona]||i.persona)}</div></td><td>${esc((i.pillars||[]).join(', '))}</td><td><span class="badge ${i.criticality==='Alta'?'b-red':i.criticality==='Média'?'b-amber':'b-green'}">${esc(i.criticality)}</span></td><td>${new Date(i.createdAt).toLocaleDateString('pt-BR')}</td><td><button class="btn btn-secondary btn-sm" onclick="viewInterview('${i.id}')">Ver</button></td></tr>`}).join('')}</tbody></table></div>`}
function adminAnalysis(el){el.innerHTML=`<div class="grid2"><div class="card"><div class="card-title">Nova análise final</div><div class="field"><label>Grupo</label><select id="a-group">${S.groups.map(g=>`<option value="${g.id}">${esc(g.name)} (${g.code})</option>`).join('')}</select></div><div class="field"><label>Análise final do consultor</label><textarea id="a-text" placeholder="Registre a leitura consultiva final, hipóteses, tensões e próximos passos sugeridos..."></textarea></div><label style="display:flex;gap:8px;align-items:center"><input id="a-release" type="checkbox" style="width:auto"> Liberar para Perfil Sócio</label><button class="btn btn-primary btn-block mt12" onclick="saveAnalysis()">Salvar análise</button></div><div class="card"><div class="card-title">Análises salvas</div>${S.analysis.map(a=>{const g=S.groups.find(x=>x.id===a.groupId)||{};return `<div class="mini-card mb8"><div class="flex between"><b>${esc(g.name)}</b><span class="badge ${a.status==='released'?'b-green':'b-gray'}">${a.status}</span></div><div class="xs muted">${new Date(a.createdAt).toLocaleString('pt-BR')}</div><div class="small mt8" style="white-space:pre-wrap">${esc(a.text.slice(0,240))}${a.text.length>240?'...':''}</div></div>`}).join('')||'<div class="muted">Nenhuma análise.</div>'}</div></div>`}
function adminData(el){const users=S.users.filter(u=>u.role!=='admin');el.innerHTML=`<div class="alert info"><b>Base consolidada:</b> filtros por segmento, porte, persona e contexto já estão previstos. No protótipo, use cadastro complementar para alimentar benchmarks futuros.</div><div class="table-wrap"><table><thead><tr><th>Nome</th><th>Empresa</th><th>Persona</th><th>Segmento</th><th>Porte</th><th>Faturamento</th><th>Cidade/UF</th></tr></thead><tbody>${users.map(u=>`<tr><td>${esc(u.name)}<div class="xs muted">${esc(u.email)}</div></td><td>${esc(u.company)}</td><td>${esc(PERSONAS[u.persona]||u.persona)}</td><td>${esc(u.segment||'—')}</td><td>${esc(u.companySize||'—')}</td><td>${esc(u.revenue||'—')}</td><td>${esc(u.city||'—')}</td></tr>`).join('')}</tbody></table></div>`}
function showCreateGroup(){document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="card-title">Criar grupo empresarial</div><div class="field"><label>Nome da empresa/grupo</label><input id="g-name"></div><div class="grid2"><div class="field"><label>Segmento</label><select id="g-segment"><option></option>${SEGMENTS.map(x=>`<option>${x}</option>`).join('')}</select></div><div class="field"><label>Porte</label><select id="g-size"><option></option>${COMPANY_SIZES.map(x=>`<option>${x}</option>`).join('')}</select></div></div><button class="btn btn-primary btn-block" onclick="createGroupAdmin()">Criar</button></div></div>`}
function createGroupAdmin(){const name=val('g-name');if(!name)return toast('Informe o nome.');const g={id:id('g'),code:code(),name,status:'active',segment:val('g-segment'),companySize:val('g-size'),createdAt:now()};S.groups.push(g);save(S);closeModal();toast('Grupo criado: '+g.code);renderAdmin()}
function editGroup(gid){const g=S.groups.find(x=>x.id===gid);if(!g)return;document.getElementById('modal-root').innerHTML=`<div class="modal-bg"><div class="modal"><div class="card-title">Editar grupo</div><div class="field"><label>Nome</label><input id="eg-name" value="${esc(g.name)}"></div><div class="grid2"><div class="field"><label>Segmento</label><select id="eg-segment"><option></option>${SEGMENTS.map(x=>`<option ${g.segment===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Porte</label><select id="eg-size"><option></option>${COMPANY_SIZES.map(x=>`<option ${g.companySize===x?'selected':''}>${x}</option>`).join('')}</select></div></div><button class="btn btn-primary btn-block" onclick="saveGroup('${gid}')">Salvar</button><button class="btn btn-ghost btn-block mt8" onclick="closeModal()">Cancelar</button></div></div>`}
function saveGroup(gid){const g=S.groups.find(x=>x.id===gid);Object.assign(g,{name:val('eg-name'),segment:val('eg-segment'),companySize:val('eg-size'),updatedAt:now()});save(S);closeModal();renderAdminBody()}
function editUser(uid){showComplement(uid)}
function editResponse(rid){const r=respById(rid);const qs=r.type==='termometro'?THERMO:buildDetailedQuestions(r.persona);document.getElementById('modal-root').innerHTML=`<div class="modal-bg"><div class="modal"><div class="card-title">Editar resposta</div><div class="alert warn">Edição administrativa. Em produção, recomenda-se registrar trilha de auditoria.</div>${qs.map(q=>`<div class="field"><label>${esc(q.p)}</label><select id="er-${q.id}">${SCALE.map(o=>`<option value="${o.v}" ${r.answers[q.id]===o.v?'selected':''}>${o.v} — ${esc(o.t)}</option>`).join('')}</select></div>`).join('')}<button class="btn btn-primary btn-block" onclick="saveEditedResponse('${rid}')">Salvar edição</button><button class="btn btn-ghost btn-block mt8" onclick="closeModal()">Cancelar</button></div></div>`}
function saveEditedResponse(rid){const r=respById(rid);const qs=r.type==='termometro'?THERMO:buildDetailedQuestions(r.persona);qs.forEach(q=>r.answers[q.id]=Number(val('er-'+q.id)));S.audit.push({id:id('audit'),action:'edit_response',rid,userId:S.current,at:now()});save(S);closeModal();renderAdminBody()}
function reopenResponse(rid){const r=respById(rid);r.status='in_progress';r.reopen=true;S.audit.push({id:id('audit'),action:'reopen_response',rid,userId:S.current,at:now()});save(S);toast('Formulário reaberto. O respondente poderá editar ao acessar novamente.');renderAdminBody()}
function newInterviewModal(){document.getElementById('modal-root').innerHTML=`<div class="modal-bg"><div class="modal"><div class="card-title">Registrar aprofundamento</div><div class="field"><label>Grupo</label><select id="i-group" onchange="updateInterviewUsers()">${S.groups.map(g=>`<option value="${g.id}">${esc(g.name)} (${g.code})</option>`).join('')}</select></div><div class="field"><label>Respondente</label><select id="i-user"></select></div><div class="field"><label>Pilares aprofundados</label><input id="i-pillars" placeholder="Ex.: Decisão, Papéis, Sucessão"></div><div class="field"><label>Criticidade</label><select id="i-criticality"><option>Baixa</option><option selected>Média</option><option>Alta</option></select></div><div class="field"><label>Dores e exemplos relatados</label><textarea id="i-pain"></textarea></div><div class="field"><label>Hipóteses do consultor</label><textarea id="i-hyp"></textarea></div><div class="field"><label>Recomendações preliminares / próximo passo</label><textarea id="i-next"></textarea></div><button class="btn btn-primary btn-block" onclick="saveInterview()">Salvar aprofundamento</button><button class="btn btn-ghost btn-block mt8" onclick="closeModal()">Cancelar</button></div></div>`;updateInterviewUsers()}
function updateInterviewUsers(){const gid=val('i-group');const uids=[...new Set(S.responses.filter(r=>r.groupId===gid).map(r=>r.userId))];const sel=document.getElementById('i-user');if(sel)sel.innerHTML=uids.map(uid=>{const u=S.users.find(x=>x.id===uid)||{};return `<option value="${uid}">${esc(u.name)} — ${esc(PERSONAS[u.persona]||u.persona)}</option>`}).join('')}
function saveInterview(){const uid=val('i-user'),u=S.users.find(x=>x.id===uid)||{};S.interviews.push({id:id('i'),groupId:val('i-group'),userId:uid,persona:u.persona,pillars:val('i-pillars').split(',').map(x=>x.trim()).filter(Boolean),criticality:val('i-criticality'),pain:val('i-pain'),hypotheses:val('i-hyp'),next:val('i-next'),consultorId:S.current,createdAt:now()});save(S);closeModal();renderAdminBody()}
function viewInterview(iid){const i=S.interviews.find(x=>x.id===iid);if(!i)return;const g=S.groups.find(x=>x.id===i.groupId)||{},u=S.users.find(x=>x.id===i.userId)||{};document.getElementById('modal-root').innerHTML=`<div class="modal-bg"><div class="modal"><div class="card-title">Aprofundamento · ${esc(g.name)}</div><div class="card-sub">${esc(u.name)} · ${esc(PERSONAS[i.persona]||i.persona)} · ${new Date(i.createdAt).toLocaleString('pt-BR')}</div><p><b>Pilares:</b> ${esc((i.pillars||[]).join(', '))}</p><p><b>Criticidade:</b> ${esc(i.criticality)}</p><hr class="hr"><p><b>Dores e exemplos:</b></p><div style="white-space:pre-wrap">${esc(i.pain)}</div><p><b>Hipóteses:</b></p><div style="white-space:pre-wrap">${esc(i.hypotheses)}</div><p><b>Próximo passo:</b></p><div style="white-space:pre-wrap">${esc(i.next)}</div><button class="btn btn-ghost btn-block mt12" onclick="closeModal()">Fechar</button></div></div>`}
function saveAnalysis(){S.analysis.push({id:id('a'),groupId:val('a-group'),text:val('a-text'),status:document.getElementById('a-release').checked?'released':'draft',createdAt:now(),consultorId:S.current});save(S);renderAdminBody();toast('Análise salva')}
function exportJSON(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gestao_de_dono_assessment_v3_base.json';a.click()}
function importJSONModal(){document.getElementById('modal-root').innerHTML=`<div class="modal-bg"><div class="modal"><div class="card-title">Importar base JSON</div><div class="alert warn">A importação substituirá a base local deste navegador.</div><input type="file" id="jsonfile" accept="application/json"><button class="btn btn-primary btn-block mt12" onclick="doImportJSON()">Importar</button><button class="btn btn-ghost btn-block mt8" onclick="closeModal()">Cancelar</button></div></div>`}
function doImportJSON(){const f=document.getElementById('jsonfile').files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const obj=JSON.parse(r.result);localStorage.setItem(STORE_KEY,JSON.stringify(obj));closeModal();toast('Base importada');setTimeout(()=>location.reload(),600)}catch(e){toast('JSON inválido')}};r.readAsText(f)}
window.onpopstate=render;render();
</script>
</body>
</html>
